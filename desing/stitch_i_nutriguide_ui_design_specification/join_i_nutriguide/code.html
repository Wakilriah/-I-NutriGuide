<body class="min-h-screen flex flex-col font-body-md text-body-md">
<!-- Hero Header Area -->
<header class="w-full pt-12 pb-8 px-container-padding text-center">
<div class="mb-4 inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-on-primary-container shadow-lg">
<span class="material-symbols-outlined !text-4xl" data-icon="nutrition">nutrition</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">I-NutriGuide</h1>
<p class="text-outline font-body-md max-w-[280px] mx-auto">Start your journey to premium personalized wellness today.</p>
</header>
<!-- Registration Form Container -->
<main class="flex-grow px-container-padding pb-12">
<div class="glass-card rounded-[32px] p-8 max-w-md mx-auto">
<h2 class="font-headline-md text-headline-md text-on-surface mb-6">Create Account</h2>
<form class="space-y-stack-gap">
<!-- Name Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary rounded-xl py-4 px-4 text-on-surface placeholder:text-outline-variant transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant transition-all" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline-variant transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Dietary Preferences Chips -->
<div class="pt-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1 block mb-3">Dietary Preference</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary-container text-on-primary-container font-label-md text-label-md transition-all active:scale-95 shadow-sm" type="button">
                            Vegan
                        </button>
<button class="px-4 py-2 rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-primary-fixed-dim transition-all active:scale-95" type="button">
                            Keto
                        </button>
<button class="px-4 py-2 rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-primary-fixed-dim transition-all active:scale-95" type="button">
                            Paleo
                        </button>
<button class="px-4 py-2 rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md hover:bg-primary-fixed-dim transition-all active:scale-95" type="button">
                            Balanced
                        </button>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-low" type="checkbox"/>
<p class="font-label-sm text-label-sm text-outline">
                        I agree to the <span class="text-primary font-semibold">Terms of Service</span> and <span class="text-primary font-semibold">Privacy Policy</span>.
                    </p>
</div>
<!-- Primary Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-[0_4px_12px_0_rgba(15,99,27,0.2)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2 mt-4" type="submit">
                    Create Account
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 text-center">
<p class="font-body-md text-outline">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Log In</a>
</p>
</div>
</div>
</main>
