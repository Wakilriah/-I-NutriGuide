entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  bolt:
    address: ":7687"

providers:
  docker:
    exposedByDefault: false
    network: inutriguide-prod_public
  file:
    filename: /etc/traefik/dynamic.yml

api:
  dashboard: false
  insecure: false

ping: {}

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${TRAEFIK_ACME_EMAIL:-ops@example.com}"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
