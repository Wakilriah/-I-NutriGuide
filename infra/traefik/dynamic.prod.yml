http:
  middlewares:
    secure-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
    dozzle-auth:
      basicAuth:
        users:
          - "${DOZZLE_BASIC_AUTH:-admin:$$apr1$$replace$$with-real-htpasswd-hash}"
