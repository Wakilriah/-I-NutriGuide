services:
  traefik:
    image: traefik:v3.1
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesResolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-ops@example.com}
      - --certificatesResolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  backend:
    build:
      context: ./apps/backend
      target: production
    env_file:
      - ${ENV_FILE:-.env.production.example}
    labels:
      - traefik.enable=true
      - traefik.http.routers.inutriguide-api.rule=Host(`${API_DOMAIN:-api.yourdomain.com}`)
      - traefik.http.routers.inutriguide-api.entrypoints=websecure
      - traefik.http.routers.inutriguide-api.tls.certresolver=letsencrypt
      - traefik.http.services.inutriguide-api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./apps/backend
      target: production
    env_file:
      - ${ENV_FILE:-.env.production.example}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    command: celery -A config worker -l info
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./apps/backend
      target: production
    env_file:
      - ${ENV_FILE:-.env.production.example}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    command: celery -A config beat -l info
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin_panel:
    build:
      context: ./apps/admin-panel
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.yourdomain.com/api/v1}
    labels:
      - traefik.enable=true
      - traefik.http.routers.inutriguide-admin.rule=Host(`${ADMIN_DOMAIN:-admin.yourdomain.com}`)
      - traefik.http.routers.inutriguide-admin.entrypoints=websecure
      - traefik.http.routers.inutriguide-admin.tls.certresolver=letsencrypt
      - traefik.http.services.inutriguide-admin.loadbalancer.server.port=80

  postgres:
    image: postgres:16-alpine
    env_file:
      - ${ENV_FILE:-.env.production.example}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-inutriguide} -d $${POSTGRES_DB:-inutriguide}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dozzle:
    image: amir20/dozzle:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.inutriguide-logs.rule=Host(`${LOGS_DOMAIN:-logs.yourdomain.com}`)
      - traefik.http.routers.inutriguide-logs.entrypoints=websecure
      - traefik.http.routers.inutriguide-logs.tls.certresolver=letsencrypt
      - traefik.http.routers.inutriguide-logs.middlewares=dozzle-auth
      - traefik.http.middlewares.dozzle-auth.basicauth.users=${DOZZLE_BASIC_AUTH:-admin:$$apr1$$replace$$with-real-htpasswd-hash}
      - traefik.http.services.inutriguide-logs.loadbalancer.server.port=8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
  redis_data:
  traefik_letsencrypt:
