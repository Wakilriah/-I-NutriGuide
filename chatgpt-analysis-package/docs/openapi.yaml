components:
  schemas:
    AdminRecommendationRun:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        user:
          allOf:
          - $ref: '#/components/schemas/RecommendationRunUserSummary'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        disclaimer:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'
      required:
      - created_at
      - items
      - run_id
      - user
    AdminUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        name:
          type: string
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
        profile:
          allOf:
          - $ref: '#/components/schemas/AdminUserProfileSummary'
          readOnly: true
        supplement_count:
          type: integer
          readOnly: true
        recommendation_count:
          type: integer
          readOnly: true
        feedback_count:
          type: integer
          readOnly: true
      required:
      - date_joined
      - email
      - feedback_count
      - id
      - is_active
      - is_staff
      - name
      - profile
      - recommendation_count
      - supplement_count
    AdminUserProfileSummary:
      type: object
      properties:
        age:
          type: integer
          nullable: true
        gender:
          type: string
        goal:
          type: string
        activity_level:
          type: string
        diet_type:
          type: string
        allergies:
          type: array
          items:
            type: string
        dietary_restrictions:
          type: array
          items:
            type: string
        disliked_foods:
          type: array
          items:
            type: string
      required:
      - activity_level
      - age
      - allergies
      - diet_type
      - dietary_restrictions
      - disliked_foods
      - gender
      - goal
    AssociationRule:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        antecedent_type:
          $ref: '#/components/schemas/AssociationRuleEntityTypeEnum'
        antecedent_slug:
          type: string
          maxLength: 150
        consequent_type:
          $ref: '#/components/schemas/AssociationRuleEntityTypeEnum'
        consequent_slug:
          type: string
          maxLength: 150
        support:
          type: number
          format: double
        confidence:
          type: number
          format: double
        lift:
          type: number
          format: double
        explanation:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - antecedent_slug
      - antecedent_type
      - consequent_slug
      - consequent_type
      - created_at
      - explanation
      - id
      - updated_at
    AssociationRuleEntityTypeEnum:
      enum:
      - supplement
      - nutrient
      - food
      - category
      type: string
      description: |-
        * `supplement` - Supplement
        * `nutrient` - Nutrient
        * `food` - Food
        * `category` - Category
    DashboardAnalytics:
      type: object
      properties:
        total_users:
          type: integer
        total_foods:
          type: integer
        total_supplements:
          type: integer
        total_recommendations:
          type: integer
        average_feedback_rating:
          type: number
          format: double
        most_used_supplements:
          type: array
          items:
            type: object
            additionalProperties: {}
        most_recommended_foods:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - average_feedback_rating
      - most_recommended_foods
      - most_used_supplements
      - total_foods
      - total_recommendations
      - total_supplements
      - total_users
    DietTypeEnum:
      enum:
      - none
      - vegetarian
      - vegan
      - halal
      - pescatarian
      - gluten_free
      - lactose_free
      type: string
      description: |-
        * `none` - None
        * `vegetarian` - Vegetarian
        * `vegan` - Vegan
        * `halal` - Halal
        * `pescatarian` - Pescatarian
        * `gluten_free` - Gluten free
        * `lactose_free` - Lactose free
    FeedbackAnalytics:
      type: object
      properties:
        total_feedback:
          type: integer
        average_rating:
          type: number
          format: double
        helpful_count:
          type: integer
        not_helpful_count:
          type: integer
      required:
      - average_rating
      - helpful_count
      - not_helpful_count
      - total_feedback
    FeedbackFoodSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
      required:
      - id
      - name
      - slug
    FeedbackRecommendationItemSummary:
      type: object
      properties:
        id:
          type: integer
        rank:
          type: integer
        food:
          $ref: '#/components/schemas/FeedbackFoodSummary'
        run_id:
          type: string
          format: uuid
      required:
      - food
      - id
      - rank
      - run_id
    Food:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 220
          pattern: ^[-a-zA-Z0-9_]+$
        category:
          type: string
          readOnly: true
        category_slug:
          type: string
          writeOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        scientific_name:
          type: string
          maxLength: 255
        ciqual_code:
          type: string
          nullable: true
          maxLength: 32
        source:
          type: string
          maxLength: 50
        serving_size_g:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,3})?$
        image_url:
          type: string
          format: uri
          maxLength: 200
        is_active:
          type: boolean
        nutrients:
          type: array
          items:
            $ref: '#/components/schemas/FoodNutrient'
          readOnly: true
        nutrient_items:
          type: array
          items:
            $ref: '#/components/schemas/FoodNutrientInput'
          writeOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - category_slug
      - created_at
      - id
      - name
      - nutrients
      - updated_at
    FoodCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        slug:
          type: string
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
        ciqual_group_code:
          type: string
          maxLength: 20
        ciqual_subgroup_code:
          type: string
          maxLength: 20
        ciqual_subsubgroup_code:
          type: string
          maxLength: 20
        source:
          type: string
          maxLength: 50
      required:
      - id
      - name
    FoodNutrient:
      type: object
      properties:
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,3})?$
        unit:
          type: string
          maxLength: 20
        per_quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,3})?$
        per_unit:
          type: string
          maxLength: 20
      required:
      - amount
      - name
      - slug
      - unit
    FoodNutrientInput:
      type: object
      properties:
        nutrient_slug:
          type: string
          pattern: ^[-a-zA-Z0-9_]+$
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,3})?$
        unit:
          type: string
          maxLength: 20
        per_quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,3})?$
          default: '100.000'
        per_unit:
          type: string
          default: g
          maxLength: 20
      required:
      - amount
      - nutrient_slug
    GenerateRecommendation:
      type: object
      properties:
        limit:
          type: integer
          maximum: 50
          minimum: 1
          default: 10
    HealthCheck:
      type: object
      properties:
        status:
          type: string
        database:
          type: string
        redis:
          type: string
      required:
      - database
      - redis
      - status
    HybridPreview:
